<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Route planen - KrokenKompass</title>

    <link href="./Code/frontend/cssFiles/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro:wght@300;400;500;600;700&display=swap"
          rel="stylesheet"/>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>

    <style>
        /* Spezifische Styles für die Routing-Komponente */
        .route-planner-container {
            max-width: 340px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .route-pill {
            background-color: var(--button-light-bg, #f2f2f7);
            border-radius: 9999px;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 220px;
            position: relative;
        }

        /* Highlight beim Anklicken des Inputs */
        .route-pill:focus-within {
            box-shadow: 0 0 0 2px var(--bulma-info);
            background-color: transparent;
            width: 100%;
        }

        /* Dropdown Styling */
        .search-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: var(--bulma-scheme-main, #ffffff);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 6px;
        }

        html[data-theme="dark"] .search-dropdown {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dropdown-item {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--bulma-text);
            font-size: 0.95rem;
            transition: background-color 0.2s ease;
            text-align: left;
        }

        .dropdown-item:hover {
            background-color: var(--button-light-bg, #f2f2f7);
        }

        .dropdown-item.is-active {
            background-color: var(--bulma-info);
            color: white;
        }

        .route-input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            color: var(--bulma-text);
            width: 100%;
            margin: 0 0.5rem;
            font-weight: 500;
        }

        .route-input::placeholder {
            color: #8e8e93;
            font-weight: 400;
        }

        /* Die feine vertikale Linie zwischen den Feldern */
        .route-line {
            width: 2px;
            height: 16px;
            background-color: #d1d1d6;
            margin: 0.25rem 0;
            border-radius: 2px;
            transform: translateX(-81px);
            transition: opacity 0.2s ease;
        }

        .route-planner-container:focus-within .route-line {
            opacity: 0;
        }

        /* Dark Mode Anpassungen für die Linie */
        html[data-theme="dark"] .route-line,

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) .route-line
        }

        {
            background-color: #48484a
        ;
        }

        /* Spezieller Schatten für den Header-Button wie im Figma Design */
        .header-action-button {
            background-color: var(--bulma-scheme-main, #ffffff);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: none;
            transition: all 0.2s ease;
        }

        .header-action-button:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="is-flex is-flex-direction-column" style="min-height: 100vh;">

<header class="header-custom is-flex is-justify-content-space-between is-align-items-center py-4 px-6">

    <div class="is-flex is-align-items-center cursor-pointer" onclick="window.location.href='index.html'">
        <svg class="mr-2" fill="currentColor" height="20" viewBox="0 0 24 24" width="20"
             xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C12 6.62742 17.3726 12 24 12C17.3726 12 12 17.3726 12 24C12 17.3726 6.62742 12 0 12C6.62742 12 12 6.62742 12 0Z"/>
        </svg>
        <span class="has-text-weight-medium is-size-5-desktop is-size-6-mobile">KrokenKompass</span>
    </div>

    <div class="is-flex is-align-items-center">

        <button aria-label="Dark Mode wechseln" class="theme-toggle mr-4" id="theme-toggle">
            <svg fill="none" height="20" id="moon-icon" stroke="currentColor" stroke-linecap="round"
                 stroke-linejoin="round"
                 stroke-width="2" viewBox="0 0 24 24" width="20">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg fill="none" height="20" id="sun-icon" stroke="currentColor" stroke-linecap="round"
                 stroke-linejoin="round"
                 stroke-width="2" style="display: none;" viewBox="0 0 24 24" width="20">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" x2="12" y1="1" y2="3"></line>
                <line x1="12" x2="12" y1="21" y2="23"></line>
                <line x1="4.22" x2="5.64" y1="4.22" y2="5.64"></line>
                <line x1="18.36" x2="19.78" y1="18.36" y2="19.78"></line>
                <line x1="1" x2="3" y1="12" y2="12"></line>
                <line x1="21" x2="23" y1="12" y2="12"></line>
                <line x1="4.22" x2="5.64" y1="19.78" y2="18.36"></line>
                <line x1="18.36" x2="19.78" y1="5.64" y2="4.22"></line>
            </svg>
        </button>

        <button class="button is-rounded header-action-button has-text-weight-medium px-5"
                onclick="window.location.href='map-routing.html'">
            Zur Karte
        </button>
    </div>
</header>

<main class="is-flex-grow-1 is-flex is-align-items-center is-justify-content-center px-4">
    <div class="has-text-centered w-100">

        <h1 class="title is-size-1-desktop is-size-2-mobile has-text-weight-bold mb-6" style="letter-spacing: -0.02em;">
            Route planen
        </h1>

        <div class="route-planner-container">

            <div class="route-pill mb-2">
                <div class="is-flex is-align-items-center is-flex-grow-1">
                    <svg fill="none" height="18" stroke="#8e8e93" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2"
                         viewBox="0 0 24 24" width="18">
                        <line x1="22" x2="11" y1="2" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>

                    <input class="route-input" id="startInput" placeholder="Start" type="text">

                    <svg class="mr-2" fill="none" height="16" stroke="#8e8e93" stroke-linecap="round"
                         stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" width="16">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>

                <button class="is-clickable is-flex is-align-items-center is-justify-content-center" id="swapBtn"
                        style="background: none; border: none; padding: 0; cursor: pointer;">
                    <svg fill="none" height="18" stroke="#8e8e93" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2"
                         viewBox="0 0 24 24" width="18">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" x2="21" y1="14" y2="3"></line>
                        <polyline points="8 21 3 21 3 16"></polyline>
                        <line x1="20" x2="3" y1="10" y2="21"></line>
                    </svg>
                </button>

                <div class="search-dropdown" id="startDropdown">
                    <div class="dropdown-item is-active">7723_00_039</div>
                    <div class="dropdown-item">7723_00_038</div>
                    <div class="dropdown-item">7723_00_035</div>
                    <div class="dropdown-item">7723_00_024</div>
                </div>
            </div>

            <div class="route-line"></div>

            <div class="route-pill mt-2">
                <div class="is-flex is-align-items-center is-flex-grow-1">
                    <svg fill="none" height="18" stroke="#8e8e93" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2"
                         viewBox="0 0 24 24" width="18">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                        <line x1="4" x2="4" y1="22" y2="15"></line>
                    </svg>

                    <input autofocus class="route-input" id="endInput" placeholder="End" type="text">
                </div>

                <svg fill="none" height="18" stroke="#8e8e93" stroke-linecap="round" stroke-linejoin="round"
                     stroke-width="2"
                     viewBox="0 0 24 24" width="18">
                    <path d="M12 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"></path>
                    <path d="M14.1 11.5L12 16h3l-2 6"></path>
                    <path d="M9.5 8L12 11.5 15.5 10"></path>
                    <path d="M7 16l3-6v-3l2 4"></path>
                </svg>

                <div class="search-dropdown" id="endDropdown">
                    <div class="dropdown-item is-active">7723_00_024</div>
                    <div class="dropdown-item">7723_00_039</div>
                    <div class="dropdown-item">7723_00_038</div>
                    <div class="dropdown-item">7723_00_035</div>
                </div>
            </div>

            <div class="has-text-danger is-size-7 mt-3" id="errorMsg" style="display:none; font-weight: 500;">
                Bitte wähle mindestens ein Ziel (End) aus.
            </div>

            <p class="has-text-danger is-size-7 mt-3" id="result"></p>

            <button class="button is-info is-rounded has-text-weight-medium mt-5" id="submitBtn"
                    style="padding: 0.5rem 1.5rem; height: auto;">
                Route finden
            </button>

        </div>
    </div>
</main>

<footer class="footer-custom py-5 px-6 is-flex is-justify-content-space-between is-align-items-center"
        style="border-top: 1px solid var(--bulma-border-weak);">
    <div class="is-flex is-align-items-center footer-links-custom">
        <svg class="mr-2" fill="currentColor" height="18" viewBox="0 0 24 24" width="18"
             xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C12 6.62742 17.3726 12 24 12C17.3726 12 12 17.3726 12 24C12 17.3726 6.62742 12 0 12C6.62742 12 12 6.62742 12 0Z"/>
        </svg>
        <span class="has-text-weight-medium mr-5">KrokenKompass</span>

        <a class="has-text-grey mr-4 is-size-7" href="#">Features</a>
        <a class="has-text-grey mr-4 is-size-7" href="#">Learn more</a>
        <a class="has-text-grey is-size-7" href="#">Support</a>
    </div>
</footer>

<script type="module">
    import rooms from "./Code/backend/vsp_units.json" with {type: "json"};
    // Logik für das Routing
    const startInput = document.getElementById("startInput");
    const endInput = document.getElementById("endInput");
    const btn = document.getElementById("submitBtn");
    const swapBtn = document.getElementById("swapBtn");
    const errorMsg = document.getElementById("errorMsg");
    const result = document.getElementById("result");

    const startDropdown = document.getElementById("startDropdown");
    const endDropdown = document.getElementById("endDropdown");

    // Dropdowns öffnen bei Klick ins Feld
    startInput.addEventListener("focus", () => {
        startDropdown.style.display = "flex";
        endDropdown.style.display = "none"; // das andere schließen
    });

    endInput.addEventListener("focus", () => {
        endDropdown.style.display = "flex";
        startDropdown.style.display = "none";
    });

    // Dropdowns schließen bei Klick nach draußen
    document.addEventListener("click", (e) => {
        if (!e.target.closest(".route-pill")) {
            startDropdown.style.display = "none";
            endDropdown.style.display = "none";
        }
    });

    // Klick auf ein Item im Dropdown
    document.querySelectorAll(".dropdown-item").forEach(item => {
        item.addEventListener("click", (e) => {
            const val = e.target.innerText;
            const parentDropdown = e.target.closest(".search-dropdown");

            if (parentDropdown.id === "startDropdown") {
                startInput.value = val;
                startDropdown.style.display = "none";
            } else if (parentDropdown.id === "endDropdown") {
                endInput.value = val;
                endDropdown.style.display = "none";
            }
        });
    });

    // Start & Ziel tauschen
    swapBtn.addEventListener("click", () => {
        const temp = startInput.value;
        startInput.value = endInput.value;
        endInput.value = temp;
    });

    function parseRooms(input) {
        return input.split(",").map(item => {
            const match = item.match(/(\d)\.(\d{2}).*VSP\s*(\d)/i);

            if (!match) return null;

            return {
                floor: match[1],
                room: match[2],
                vsp: match[3]
            };
        }).filter(Boolean);
    }

    function getBuilding(vsp) {
        return {
            "1": "7721",
            "2": "7722",
            "3": "7723",
            "4": "7724"
        }[vsp] || null;
    }

    // Formular absenden
    const triggerSearch = () => {
        console.log("Rooms geladen:", rooms.length);
        const valueStart = startInput.value.trim();
        const valueEnd = endInput.value.trim();

        if (!valueEnd) {
            errorMsg.style.display = "block";
            return;
        }

        errorMsg.style.display = "none";

        try {
            const parsedStart = parseRooms(valueStart);
            const parsedEnd = parseRooms(valueEnd);
            if (!parsedEnd.length) {
                result.innerHTML = "Ungültige  hier Eingabe";
                return;
            }
            console.log("-2")

            const pEnd = parsedEnd[0];
            let pStart = parsedStart[0];
            const buildingCodeEnd = getBuilding(pEnd.vsp);
            if (pStart == null) {
                pStart = {floor: "0", room: "111", vsp: "1"}

            }
            const buildingCodeStart = getBuilding(pStart.vsp);

            pStart.room = pStart.room.padStart(3, "0");
            pEnd.room = pEnd.room.padStart(3, "0");
            pStart.floor = pStart.floor.padStart(2, "0");
            pEnd.floor = pEnd.floor.padStart(2, "0");
            const filteredRoomsStart = rooms.filter(room => {
                const [b, floor, unit] = room.name.split("_");
                return (
                    floor === pStart.floor &&
                    unit === pStart.room &&
                    b === buildingCodeStart
                );
            });


            if (!filteredRoomsStart.length) {
                result.innerHTML = "Start-Raum nicht gefunden";
                return;
            }

            const filteredRoomsEnd = rooms.filter(room => {
                const [b, floor, unit] = room.name.split("_");

                return (
                    floor === pEnd.floor &&
                    unit === pEnd.room &&
                    b === buildingCodeEnd &&
                    room.use_type !== "Tür"
                );
            });

            if (!filteredRoomsEnd.length) {
                result.innerHTML = "End-Raum nicht gefunden";
                return;
            }

            const roomStart = filteredRoomsStart[0];
            const roomEnd = filteredRoomsEnd[0];


            let url = `map-routing.html?ziel=${encodeURIComponent(roomEnd.name)}`;
            if (roomStart.name) {
                url += `&start=${encodeURIComponent(roomStart.name)}`;
            }
            window.location.href = url;

        } catch (err) {
            console.error(err);
            result.innerHTML = "Ungültige Catch Eingabe";
        }
    }

    btn.addEventListener("click", triggerSearch);

    // Enter-Taste fangen
    [startInput, endInput].forEach(input => {
        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                triggerSearch();
            }
        });
    });

    // Logik für Theme Toggle (identisch zur Startseite)
    document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlEl = document.documentElement;

        function updateIcon() {
            const isDark = htmlEl.getAttribute('data-theme') === 'dark' ||
                (!htmlEl.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }

        updateIcon();

        toggleBtn.addEventListener('click', () => {
            let currentTheme = htmlEl.getAttribute('data-theme');
            if (!currentTheme) {
                currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            htmlEl.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (!localStorage.getItem('theme')) {
                updateIcon();
            }
        });
    });
</script>
</body>
</html>
