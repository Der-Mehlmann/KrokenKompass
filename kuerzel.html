<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

          rel="stylesheet"/>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>

    <style>
        /* Spezifische Styles für die Routing-Komponente */
        .route-planner-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .route-pill {
            background-color: var(--button-light-bg, #f2f2f7);
            border-radius: 9999px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 260px;
            position: relative;
        }

        /* Highlight beim Anklicken des Inputs */
        .route-pill:focus-within {
            box-shadow: 0 0 0 2px var(--bulma-info);
            background-color: transparent;
            width: 100%;
        }

        /* Dropdown Styling */
        .search-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: var(--bulma-scheme-main, #ffffff);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 6px;
            animation: slideDownFade 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top center;
        }

        @keyframes slideDownFade {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            20%, 60% {
                transform: translateX(-4px);
            }
            40%, 80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        html[data-theme="dark"] .search-dropdown {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dropdown-item {
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--bulma-text);
            font-size: 1rem;
            transition: background-color 0.2s ease;
            text-align: left;
        }

        .dropdown-item:hover {
            background-color: var(--button-light-bg, #f2f2f7);
        }

        .dropdown-item.is-active {
            background-color: var(--bulma-info);
            color: white;
        }

        .route-input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 1.15rem;
            font-family: inherit;
            color: var(--bulma-text);
            width: 100%;
            margin: 0 0.5rem;
            font-weight: 500;
        }

        .route-input::placeholder {
            color: #8e8e93;
            font-weight: 400;
        }

        /* Die feine vertikale Linie zwischen den Feldern */
        .route-line {
            width: 2px;
            height: 16px;
            background-color: #d1d1d6;
            margin: 0.25rem 0;
            border-radius: 2px;
            transform: translateX(-81px);
            transition: opacity 0.2s ease;
        }

        .route-planner-container:focus-within .route-line {
            opacity: 0;
        }

        /* Dark Mode Anpassungen für die Linie */
        html[data-theme="dark"] .route-line,

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) .route-line
        }

        {
            background-color: #48484a
        ;
        }

        /* Spezieller Schatten für den Header-Button wie im Figma Design */
        .header-action-button {
            background-color: var(--bulma-scheme-main, #ffffff);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: none;
            transition: all 0.2s ease;
        }

        .header-action-button:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<script type="module">
    import rooms from "./Code/backend/vsp_units.json" with {type: "json"};
    // Logik für das Routing
    const startInput = document.getElementById("startInput");
    const endInput = document.getElementById("endInput");
    const btn = document.getElementById("submitBtn");
    const swapBtn = document.getElementById("swapBtn");
    const errorMsg = document.getElementById("errorMsg");
    const result = document.getElementById("result");

    const startDropdown = document.getElementById("startDropdown");
    const endDropdown = document.getElementById("endDropdown");

    // Alias Map für benutzerfreundliche Namen
    const aliases = {
        "Café Einstein": {floor: "00", room: "010", vsp: "3"},
        "Campus Eingang Ost": {floor: "00", room: "111", vsp: "1"}
    };

    const defaultSuggestions = [
        "Café Einstein",
        "Campus Eingang Ost",
        "2.28 VSP 1",
        "0.39 VSP 3"
    ];

    function formatRoomName(internalName) {
        // z.B. 7723_00_039 -> 0.39 VSP 3
        const parts = internalName.split("_");
        if (parts.length !== 3) return internalName;
        const b = parts[0];
        const floor = parseInt(parts[1], 10);
        const room = parts[2].replace(/^0+/, ''); // führende Nullen entfernen
        const vspMap = {"7721": "1", "7722": "2", "7723": "3", "7724": "4"};
        const vsp = vspMap[b];
        if (!vsp) return internalName;
        return `${floor}.${room} VSP ${vsp}`;
    }

    function renderDropdown(dropdownEl, inputEl, query) {
        dropdownEl.innerHTML = "";
        let matches = [];

        if (!query) {
            matches = [...defaultSuggestions];
        } else {
            const q = query.toLowerCase();
            // 1. Aliases durchsuchen
            for (let key of Object.keys(aliases)) {
                if (key.toLowerCase().includes(q)) matches.push(key);
            }
            // 2. Räume durchsuchen
            for (let r of rooms) {
                if (r.use_type === "Tuer" || r.use_type === "Tür" || !r.name) continue;
                const formatted = formatRoomName(r.name);
                if (formatted.toLowerCase().includes(q) && !matches.includes(formatted)) {
                    matches.push(formatted);
                }
                if (matches.length >= 15) break; // Max 15 Treffer
            }
        }

        if (matches.length === 0) {
            if (query) {
                const div = document.createElement("div");
                div.className = "dropdown-item";
                div.style.cursor = "default";
                div.style.color = "#8e8e93";
                div.innerText = "Keine Treffer gefunden";
                dropdownEl.appendChild(div);
                dropdownEl.style.display = "flex";
            } else {
                dropdownEl.style.display = "none";
            }
            return;
        }

        matches.forEach((m, index) => {
            const div = document.createElement("div");
            div.className = "dropdown-item";
            if (index === 0 && query) div.classList.add("is-active");
            div.innerText = m;

            // Mouse down statt click, damit es feuert, bevor der input den focus verliert (falls onblur verwendet wird)
            div.addEventListener("mousedown", (e) => {
                e.preventDefault();
                inputEl.value = m;
                dropdownEl.style.display = "none";
            });
            dropdownEl.appendChild(div);
        });
        dropdownEl.style.display = "flex";
    }

    // Dropdowns öffnen & filtern bei Fokus und Eingabe
    startInput.addEventListener("focus", () => {
        renderDropdown(startDropdown, startInput, startInput.value.trim());
        endDropdown.style.display = "none"; 
    });

    endInput.addEventListener("focus", () => {
        renderDropdown(endDropdown, endInput, endInput.value.trim());
        startDropdown.style.display = "none";
    });

    startInput.addEventListener("input", (e) => {
        renderDropdown(startDropdown, startInput, e.target.value.trim());
    });

    endInput.addEventListener("input", (e) => {
        renderDropdown(endDropdown, endInput, e.target.value.trim());
    });

    // Dropdowns schließen bei Klick nach draußen
    document.addEventListener("click", (e) => {
        if (!e.target.closest(".route-pill")) {
            startDropdown.style.display = "none";
            endDropdown.style.display = "none";
        }
    });

    // Start & Ziel tauschen
    swapBtn.addEventListener("click", () => {
        const temp = startInput.value;
        startInput.value = endInput.value;
        endInput.value = temp;
    });

    // Standort Button
    const locationBtn = document.getElementById("locationBtn");
    if (locationBtn) {
        locationBtn.addEventListener("click", () => {
            startInput.value = "Campus Eingang Ost";
        });
    }

    function parseRooms(input) {
        return input.split(",").map(item => {
            const trimmed = item.trim();
            // 1. Alias Check
            if (aliases[trimmed]) {
                return aliases[trimmed];
            }

            // 2. Regex Check (erweitert auf \d+ für den Raum)
            const match = trimmed.match(/(\d)\.(\d+).*VSP\s*(\d)/i);

            if (!match) return null;

            return {
                floor: match[1],
                room: match[2],
                vsp: match[3]
            };
        }).filter(Boolean);
    }

    function getBuilding(vsp) {
        return {
            "1": "7721",
            "2": "7722",
            "3": "7723",
            "4": "7724"
        }[vsp] || null;
    }

    // Formular absenden
    const triggerSearch = () => {
        console.log("Rooms geladen:", rooms.length);
        const valueStart = startInput.value.trim();
        const valueEnd = endInput.value.trim();
        const container = document.querySelector(".route-planner-container");

        const triggerError = (msg) => {
            if (msg) {
                errorMsg.innerText = msg;
                errorMsg.style.display = "block";
            }
            container.classList.remove("shake");
            void container.offsetWidth; // trigger reflow
            container.classList.add("shake");
        };

        if (!valueEnd) {
            triggerError("Bitte wähle mindestens ein Ziel (End) aus.");
            return;
        }

        errorMsg.style.display = "none";

        try {
            const parsedStart = parseRooms(valueStart);
            const parsedEnd = parseRooms(valueEnd);
            if (!parsedEnd.length) {
                triggerError("Ungültige Zieleingabe");
                return;
            }
            console.log("-2")

            const pEnd = parsedEnd[0];
            let pStart = parsedStart[0];
            const buildingCodeEnd = getBuilding(pEnd.vsp);
            if (pStart == null) {
                pStart = {floor: "0", room: "111", vsp: "1"}

            }
            const buildingCodeStart = getBuilding(pStart.vsp);

            pStart.room = pStart.room.padStart(3, "0");
            pEnd.room = pEnd.room.padStart(3, "0");
            pStart.floor = pStart.floor.padStart(2, "0");
            pEnd.floor = pEnd.floor.padStart(2, "0");
            const filteredRoomsStart = rooms.filter(room => {
                const [b, floor, unit] = room.name.split("_");
                return (
                    floor === pStart.floor &&
                    unit === pStart.room &&
                    b === buildingCodeStart
                );
            });


            if (!filteredRoomsStart.length) {
                triggerError("Start-Raum nicht gefunden");
                return;
            }

            const filteredRoomsEnd = rooms.filter(room => {
                const [b, floor, unit] = room.name.split("_");

                return (
                    floor === pEnd.floor &&
                    unit === pEnd.room &&
                    b === buildingCodeEnd &&
                    room.use_type !== "Tür"
                );
            });

            if (!filteredRoomsEnd.length) {
                triggerError("End-Raum nicht gefunden");
                return;
            }

            const roomStart = filteredRoomsStart[0];
            const roomEnd = filteredRoomsEnd[0];


            let url = `map-routing.html?ziel=${encodeURIComponent(roomEnd.name)}`;
            if (roomStart.name) {
                url += `&start=${encodeURIComponent(roomStart.name)}`;
            }
            window.location.href = url;

        } catch (err) {
            console.error(err);
            triggerError("Es ist ein Fehler aufgetreten.");
        }
    }

    btn.addEventListener("click", triggerSearch);

    // Enter-Taste fangen
    [startInput, endInput].forEach(input => {
        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                triggerSearch();
            }
        });
    });

    // Logik für Theme Toggle (identisch zur Startseite)
    document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlEl = document.documentElement;

        function updateIcon() {
            const isDark = htmlEl.getAttribute('data-theme') === 'dark' ||
                (!htmlEl.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }

        updateIcon();

        toggleBtn.addEventListener('click', () => {
            let currentTheme = htmlEl.getAttribute('data-theme');
            if (!currentTheme) {
                currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            htmlEl.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (!localStorage.getItem('theme')) {
                updateIcon();
            }
        });
    });
</script>
</body>
</html>
