name: Fehlerbericht (Bug)
description: Melde einen Fehler, den du gefunden hast.
title: "🐛 Bug: kurze Beschreibung"
labels: ["Status: Backlog", "Type: Bug"]
assignees: []
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Vorab-Check
      options:
        - label: Ich habe bereits nach ähnlichen Fehlermeldungen (Issues) gesucht.
          required: true
        - label: Ich kann den Fehler in der aktuellen Version (Main-Branch) reproduzieren.
          required: false

  - type: textarea
    id: description
    attributes:
      label: Beschreibung des Fehlers
      description: Eine klare und prägnante Beschreibung des Problems.
      placeholder: Was genau funktioniert nicht wie erwartet?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      description: Wie können wir den Fehler nachstellen?
      placeholder: |
        1. Gehe zu '...'
        2. Klicke auf '...'
        3. Scrolle zu '...'
        4. Siehe Fehler
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
      description: Was hätte stattdessen passieren sollen?
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Dringlichkeit / Schweregrad
      options:
        - Hoch (App ist unbenutzbar)
        - Mittel (Funktion eingeschränkt)
        - Niedrig (Kosmetischer Fehler)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser & Betriebssystem
      placeholder: z.B. Chrome auf Windows 11, Safari auf iOS 18
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App-Version
      description: "Welche Version nutzt du? (Den kurzen Git-Hash findest du auf der Webseite unten rechts im Footer)"
      placeholder: z.B. va1b2c3d
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Betroffener Projektbereich
      multiple: true
      options:
        - Frontend / UI (HTML/CSS)
        - Elm Logik / Routing
        - Karten-Darstellung (Leaflet.js)
        - Geo-Daten / Graphen-Skript (Node.js)
        - Dokumentation
        - Weiß nicht genau

  - type: textarea
    id: logs
    attributes:
      label: Konsolen-Ausgaben oder Logs
      description: Falls vorhanden, füge Fehlermeldungen aus der Browser-Konsole hier ein.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
