name: Feature-Vorschlag
description: Schlage eine neue Funktion oder Verbesserung vor.
title: "✨ Feature: kurze Beschreibung"
labels: ["Status: To Do", "Type: Feature"]
assignees: []
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Vorab-Check
      options:
        - label: Ich habe geprüft, ob es diese Idee bereits als Issue gibt.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Welches Problem löst das Feature?
      description: Beschreibe kurz, in welcher Situation dir diese Funktion helfen würde.
      placeholder: Mir ist aufgefallen, dass...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Lösungsvorschlag
      description: Wie stellst du dir die neue Funktion vor?
      placeholder: Ich fände es super, wenn KrokenKompass...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Welchen Projektbereich betrifft das?
      multiple: true
      options:
        - Frontend / UI Design
        - Elm Logik / Neue Routing-Features
        - Interaktion mit der Karte
        - Zusätzliche Gebäude / Räume (Geodaten)
        - Sonstiges

  - type: dropdown
    id: priority
    attributes:
      label: Priorität (deiner Einschätzung nach)
      options:
        - Wäre cool (Low)
        - Sehr nützlich (Medium)
        - Dringend benötigt (High)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Zusätzlicher Kontext / Mockups
      description: Falls du Skizzen, Links oder weitere Ideen hast, immer her damit!
