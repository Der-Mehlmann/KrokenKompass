<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>3D Indoor-Routing: Campus-Plan</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }

        #info-box {
            position: absolute;
            top: 10px;
            left: 70px;
            z-index: 1000;
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        #etagen-menue {
            position: absolute;
            top: 60px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .etagen-btn {
            padding: 8px 12px;
            cursor: pointer;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 3px;
            font-weight: bold;
        }

        .etagen-btn:hover {
            background: #e5e7eb;
        }

        .etagen-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body>

<div id="etagen-menue">
    <div style="font-size: 12px; color: #666; margin-bottom: 5px; text-align: center;">Etage</div>
    <button class="etagen-btn" data-etage="05" onclick="wechsleEtage('05')">05</button>
    <button class="etagen-btn" data-etage="04" onclick="wechsleEtage('04')">04</button>
    <button class="etagen-btn" data-etage="03" onclick="wechsleEtage('03')">03</button>
    <button class="etagen-btn" data-etage="02" onclick="wechsleEtage('02')">02</button>
    <button class="etagen-btn" data-etage="01" onclick="wechsleEtage('01')">01</button>
    <button class="etagen-btn active" data-etage="00" onclick="wechsleEtage('00')">00</button>
    <button class="etagen-btn" data-etage="-1" onclick="wechsleEtage('-1')">-1</button>
</div>

<div id="info-box">Lade Gebäudedaten und baue 3D-Netzwerk...</div>
<div id="map"></div>

<script src="./Code/backend/map-routing.js"></script>

</body>
</html>
