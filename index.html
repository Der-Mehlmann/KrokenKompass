<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>KrokenKompass</title>
    <link href="./Code/frontend/cssFiles/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
</head>
<body>

<header class="header-custom is-flex is-justify-content-space-between is-align-items-center py-4 px-6">

    <div class="is-flex is-align-items-center cursor-pointer" onclick="window.location.href='index.html'">

        </svg>
        <span class="has-text-weight-medium is-size-5-desktop is-size-6-mobile">KrokenKompass</span>
    </div>

    <div class="is-flex is-align-items-center">

        <button aria-label="Dark Mode wechseln" class="theme-toggle mr-4" id="theme-toggle">
            <svg fill="none" height="20" id="moon-icon" stroke="currentColor" stroke-linecap="round"
                 stroke-linejoin="round"
                 stroke-width="2" viewBox="0 0 24 24" width="20">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg fill="none" height="20" id="sun-icon" stroke="currentColor" stroke-linecap="round"
                 stroke-linejoin="round"
                 stroke-width="2" style="display: none;" viewBox="0 0 24 24" width="20">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" x2="12" y1="1" y2="3"></line>
                <line x1="12" x2="12" y1="21" y2="23"></line>
                <line x1="4.22" x2="5.64" y1="4.22" y2="5.64"></line>
                <line x1="18.36" x2="19.78" y1="18.36" y2="19.78"></line>
                <line x1="1" x2="3" y1="12" y2="12"></line>
                <line x1="21" x2="23" y1="12" y2="12"></line>
                <line x1="4.22" x2="5.64" y1="19.78" y2="18.36"></line>
                <line x1="18.36" x2="19.78" y1="5.64" y2="4.22"></line>
            </svg>
        </button>

        <button class="button is-info is-rounded has-text-weight-medium px-5"
                onclick="window.location.href='kuerzel.html'">
            Raum finden
        </button>
    </div>
</header>

<section class="hero is-medium mt-4">
    <div class="hero-body has-text-centered is-flex is-flex-direction-column is-justify-content-center">

        <div class="container is-max-widescreen">
            <h1 class="title hero-title-custom">
                Finde deinen Weg über<br>den Campus.
            </h1>
            <p class="subtitle hero-subtitle-custom is-size-5 mt-4" style="font-weight: 300;">
                Suche nach Gebäuden oder Räumen und starte die Navigation.
            </p>

            <div class="buttons is-centered mt-5 hero-buttons-custom">
                <button class="button is-info is-medium is-rounded has-text-weight-medium px-6"
                        onclick="window.location.href='kuerzel.html'">
                    Raum finden
                </button>
                <button class="button button-secondary is-medium is-rounded px-6"
                        onclick="window.location.href='map-routing.html'">
                    Zur Karte
                </button>
            </div>
        </div>

    </div>
</section>

<section class="section pt-0 pb-6 mt-4">
    <div class="container is-max-widescreen">
        <div class="columns is-variable is-3">
            <div class="column">
                <div class="abstract-card" style="background-color: #B2D8C6;">
                    <div class="color-block is-flex-direction-column" style="bottom: 40px; left: 40px;">
                        <span class="color-square" style="background-color: #007AFF;"></span>
                        <span class="color-square" style="background-color: #FFD60A;"></span>
                        <span class="color-square" style="background-color: #FF375F;"></span>
                        <span class="color-square" style="background-color: #34C759;"></span>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="abstract-card" style="background-color: #EBBCA4;">
                    <div class="color-block is-flex-direction-row" style="bottom: 40px; left: 40px;">
                        <span class="color-square" style="background-color: #FF3B30;"></span>
                        <span class="color-square" style="background-color: #000000;"></span>
                        <span class="color-square" style="background-color: #FFFFFF;"></span>
                        <span class="color-square" style="background-color: #5AC8FA;"></span>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="abstract-card" style="background-color: #A9BCE4;">
                    <div class="color-block is-flex-direction-column"
                         style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
                        <span class="color-square" style="background-color: #34C759;"></span>
                        <span class="color-square" style="background-color: #FF9500;"></span>
                        <span class="color-square" style="background-color: #1C1C1E;"></span>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="abstract-card" style="background-color: #BBDD9B;">
                    <div class="color-block is-flex-direction-column" style="top: 40px; right: 40px;">
                        <span class="color-square" style="background-color: #FF3B30;"></span>
                        <span class="color-square" style="background-color: #FFFFFF;"></span>
                        <span class="color-square" style="background-color: #007AFF;"></span>
                        <span class="color-square" style="background-color: #0040DD;"></span>
                        <span class="color-square" style="background-color: #34C759;"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer-custom py-5 px-6 is-flex is-justify-content-space-between is-align-items-center"
        style="border-top: 1px solid var(--bulma-border-weak);">
    <div class="is-flex is-align-items-center footer-links-custom">
        <svg class="mr-2" fill="currentColor" height="24" viewBox="0 0 24 24" width="24"
             xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C12 6.62742 17.3726 12 24 12C17.3726 12 12 17.3726 12 24C12 17.3726 6.62742 12 0 12C6.62742 12 12 6.62742 12 0Z"/>
        </svg>
        <span class="has-text-weight-medium mr-5 is-size-5">KrokenKompass</span>

        <a class="has-text-grey mr-4 is-size-6" href="#">Features</a>
        <a class="has-text-grey mr-4 is-size-6" href="#">Learn more</a>
        <a class="has-text-grey is-size-6" href="#">Support</a>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlEl = document.documentElement;

        // Update Icons basierend auf dem aktuellen Theme
        function updateIcon() {
            const isDark = htmlEl.getAttribute('data-theme') === 'dark' ||
                (!htmlEl.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

            if (isDark) {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }

        // Initiale Ausführung
        updateIcon();

        // Click Event
        toggleBtn.addEventListener('click', () => {
            let currentTheme = htmlEl.getAttribute('data-theme');

            if (!currentTheme) {
                currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            htmlEl.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon();
        });

        // Reagiere auf System-Änderungen, wenn kein manuelles Theme gesetzt ist
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                updateIcon();
            }
        });
    });
</script>
<script defer src="./Code/backend/map-routing.js" type="module"></script>
</body>
</html>
